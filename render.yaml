services:
  - type: web
    name: lumina-updates
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    envVars:
      - key: ADMIN_KEY
        sync: false
      - key: GROQ_KEY
        sync: false
      - key: FIREBASE_CREDENTIALS
        sync: false
      - key: PORT
        value: 10000
